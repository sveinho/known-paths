<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Path Registry</title>
    <!-- Link to your custom stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Load Markdown-it parser library from CDN safely before app logic runs -->
    <script src="https://cloudflare.com" integrity="sha512-Y17btuUv7gV6coX6pNEZst92Nms6DOD8393S6X6nkW9+K1BOfL8Gclb6AUpL90G3z7G2mS97m4z7w6n+==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

    <!-- Main Navigation Bar -->
    <header class="main-header">
        <div class="header-container">
            <h1>🎓 Learning Path Registry</h1>
            <p>Track your progress and master new skills step-by-step.</p>
        </div>
    </header>

    <!-- Search and Filter Control Center -->
    <section class="control-panel">
        <div class="search-wrapper">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search modules by name, technology or concepts..." 
                aria-label="Search learning modules"
            >
            <button id="resetSearchBtn" class="invisible" title="Clear search filters">✕</button>
        </div>
        
        <!-- Status indicator text showing dynamic results count -->
        <div id="searchCounter" class="search-counter">Loading track registry index...</div>
    </section>

    <!-- Core Dynamic Content Section -->
    <main class="content-container">
        
        <!-- Target container where app.js will injection the module cards -->
        <div id="articlesContainer" class="modules-grid"></div>

        <!-- Fallback view shown only when zero query results return -->
        <div id="noResults" class="hidden feedback-box">
            <h3>No matching modules found</h3>
            <p>Try adjusting your search terms or clearing the filter to see all structured tracks.</p>
        </div>

        <!-- Pagination Controls wrapper -->
        <div id="loadMoreWrapper" class="hidden pagination-bar">
            <button id="loadMoreBtn" class="primary-btn">Load More Modules ↓</button>
        </div>

    </main>

    <!-- Global Footer -->
    <footer class="main-footer">
        <p>Powered by Markdown-it and GitHub Pages.</p>
    </footer>

    <!-- Load your combined JavaScript file containing Part 1 and Part 2 -->
    <script src="app.js"></script>
</body>
</html>
